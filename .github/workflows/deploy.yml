name: Build and deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build index.html
        run: python scripts/build_index.py
      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html _site/
          # Auto-copy every top-level directory except the excluded ones below.
          # Add a name here to keep it out of the deployed site.
          excluded=( _site scripts 本地 )
          shopt -s nullglob
          for dir in */; do
            name="${dir%/}"
            skip=0
            for ex in "${excluded[@]}"; do
              if [ "$name" = "$ex" ]; then skip=1; break; fi
            done
            if [ "$skip" -eq 1 ]; then
              echo "skip $name"
              continue
            fi
            echo "copy $name"
            cp -r "$name" "_site/$name"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
