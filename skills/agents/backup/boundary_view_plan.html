<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Figure Boundary View Plan</title>
<style>
:root {
  --bg: #f3f4f6;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --text2: #6b7280;
  --text3: #9ca3af;
  --phase1: #fff7ed;
  --phase1-border: #fed7aa;
  --phase1-head: #ea580c;
  --phase2: #eff6ff;
  --phase2-border: #bfdbfe;
  --phase2-head: #2563eb;
  --notes: #f0fdf4;
  --notes-border: #bbf7d0;
  --claude: #eff6ff;
  --claude-border: #bfdbfe;
  --claude-head: #2563eb;
  --notes-head: #16a34a;
  --decision: #2563eb;
  --todo: #d97706;
  --defer: #7c3aed;
  --done: #16a34a;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,.1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #1e293b;
  color: #f1f5f9;
  padding: 12px 24px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.topbar h1 { font-size: 16px; font-weight: 650; margin-right: auto; white-space: nowrap; }
.progress { font-size: 13px; color: #94a3b8; white-space: nowrap; }
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn, .ctrl-btn {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.18);
  background: transparent;
  color: #cbd5e1;
}
.filter-btn { border-radius: 12px; }
.filter-btn:hover, .ctrl-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
.filter-btn.active { background: rgba(255,255,255,.16); color: #fff; border-color: rgba(255,255,255,.4); }
.save-btn { background: rgba(34,197,94,.2); color: #4ade80; border-color: rgba(34,197,94,.4); font-weight: 650; }
.search-wrap { padding: 16px 24px 0; max-width: 1400px; margin: 0 auto; }
.search-input {
  width: 100%;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  background: var(--card);
  outline: none;
}
.search-input:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
.container { max-width: 1400px; margin: 0 auto; padding: 16px 24px 80px; }
.overview {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  overflow: hidden;
}
.overview-head {
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 650;
  border-bottom: 1px solid var(--border);
}
.phase-grid { display: grid; grid-template-columns: 1fr 1fr; }
@media (max-width: 900px) { .phase-grid { grid-template-columns: 1fr; } }
.phase-col { padding: 16px 20px; font-size: 13px; }
.phase-col:first-child { background: var(--phase1); border-right: 1px solid var(--border); }
.phase-col:last-child { background: var(--phase2); }
.phase-col h2 { font-size: 14px; margin-bottom: 8px; }
.phase-col.phase1 h2 { color: var(--phase1-head); }
.phase-col.phase2 h2 { color: var(--phase2-head); }
.phase-col ul { margin-left: 18px; }
.phase-col li { margin-bottom: 4px; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow .15s;
}
.card:hover { box-shadow: var(--shadow-lg); }
.card.hidden { display: none; }
.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  cursor: pointer;
  user-select: none;
}
.card-header:hover { background: #f9fafb; }
.card-num {
  font-size: 12px;
  font-weight: 750;
  color: #fff;
  background: #64748b;
  min-width: 34px;
  height: 28px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.card-num.phase1 { background: var(--phase1-head); }
.card-num.phase2 { background: var(--phase2-head); }
.card-title { font-size: 15px; font-weight: 650; flex: 1; }
.card-arrow { font-size: 12px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
.card.open .card-arrow { transform: rotate(90deg); }
.badge {
  font-size: 11px;
  font-weight: 650;
  padding: 2px 10px;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge[data-status="decision"] { background: #dbeafe; color: var(--decision); }
.badge[data-status="todo"] { background: #fef3c7; color: var(--todo); }
.badge[data-status="defer"] { background: #ede9fe; color: var(--defer); }
.badge[data-status="done"] { background: #dcfce7; color: var(--done); }
.status-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  z-index: 50;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  min-width: 140px;
}
.status-menu.open { display: block; }
.status-option {
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-option:hover { background: #f3f4f6; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.card-body { display: none; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }
.section-toggle {
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  background: #f9fafb;
}
.section-toggle:hover { color: var(--text); }
.section-toggle .arrow { font-size: 10px; transition: transform .15s; }
.section-toggle.open .arrow { transform: rotate(90deg); }
.section-content {
  display: none;
  padding: 16px 20px;
  background: #f9fafb;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
}
.section-content.open { display: block; }
.plan-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; min-height: 120px; }
@media (max-width: 1000px) { .plan-grid { grid-template-columns: 1fr; } }
@media (max-width: 760px) { .plan-grid { grid-template-columns: 1fr; } }
.panel {
  padding: 16px 20px;
  font-size: 13px;
  line-height: 1.65;
  border-right: 1px solid var(--border);
}
.panel:last-child { border-right: none; }
.panel.phase1 { background: var(--phase1); }
.panel.phase2 { background: var(--phase2); }
.panel.notes { background: var(--notes); }
.panel-head {
  font-size: 11px;
  font-weight: 750;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-head .dot { width: 6px; height: 6px; border-radius: 50%; }
.panel-head.phase1 { color: var(--phase1-head); }
.panel-head.phase1 .dot { background: var(--phase1-head); }
.panel-head.phase2 { color: var(--phase2-head); }
.panel-head.phase2 .dot { background: var(--phase2-head); }
.panel-head.notes { color: var(--notes-head); }
.panel-head.notes .dot { background: var(--notes-head); }
.panel.claude { background: var(--claude); }
.panel-head.claude { color: var(--claude-head); }
.panel-head.claude .dot { background: var(--claude-head); }
.panel p { margin-bottom: 8px; }
.panel ul, .panel ol, .section-content ul, .section-content ol { margin: 6px 0 10px 18px; }
.panel li, .section-content li { margin-bottom: 3px; }
pre {
  background: rgba(0,0,0,.05);
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 12px;
  overflow-x: auto;
  margin: 8px 0;
  line-height: 1.5;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
}
code {
  background: rgba(0,0,0,.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", monospace;
}
pre code { background: none; padding: 0; }
.note {
  width: 100%;
  min-height: 92px;
  padding: 8px 10px;
  font-size: 13px;
  border: 1px solid var(--notes-border);
  border-radius: 6px;
  background: #fff;
  resize: vertical;
  font-family: inherit;
  line-height: 1.5;
}
.note:focus { outline: none; border-color: #86efac; box-shadow: 0 0 0 3px rgba(22,163,74,.1); }
.save-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1e293b;
  color: #f1f5f9;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  z-index: 200;
}
.save-toast.show { opacity: 1; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>

<div class="topbar">

<script id="user-data">
const EMBEDDED_USER_DATA = {
  "statuses": {},
  "notes": {}

<script>
const STORAGE_KEY = 'figure_boundary_view_plan_v1';

const STATUS_LABELS = {
  decision: '決策',
  todo: '待實作',
  defer: 'Phase 2',
  done: '完成'
};

const STATUS_META = {
  decision: { color: '#2563eb' },
  todo: { color: '#d97706' },
  defer: { color: '#7c3aed' },
  done: { color: '#16a34a' }
};

const cards = [
{
  id: 'BV-0',
  phase: 'phase1',
  status: 'decision',
  title: 'Case study：ED Fig 2 為何漏掉',
  context: `
<p>跑完 luciferase paper 後，<code>Extended_Data_Figure_2_bottom.png</code> 的紅線清楚穿過 "Discard Inactive Enzymes" 垃圾桶 icon 的下緣，但 worker_01 標 pass、reviewer_01 標 <code>clean_margin</code>，整張圖以 14/14 close 收場。這張卡定義整份計畫要解掉的失敗。</p>`,
  plan: `
<p><strong>三個 root cause</strong>：</p>
<ol>
  <li><strong>粒度坍縮</strong>：reviewer 把 11 個 labeled workflow icon 寫成一個 <code>workflow_icons: icon_set</code>，per-icon 完整性不存在 schema 欄位可承載。</li>
  <li><strong>Edge strip 太窄</strong>：±100 px 條看不到垃圾桶整體輪廓，只看到「貼著紅線的未知 stub」。</li>
  <li><strong>Perception correlated</strong>：worker 和 reviewer 都用「caption 在線下方 = clean」捷徑；evidence 獨立但 judgment heuristic 一樣，獨立性沒救它。</li>
</ol>`,
  implementation: `
<p>修法分兩階段：</p>
<ul>
  <li><strong>Phase 1（本計畫前 7 張卡）</strong>：改 artifact 形狀 — 用 boundary view 取代 4 條 edge previews。直接解掉問題 2，靠 gestalt-style 視覺判斷削弱問題 3。</li>
  <li><strong>Phase 2（後 5 張卡）</strong>：在新 artifact 上鎖緊 schema — 強制 unit 粒度、edge 條件必須命名 unit、observed_units 必須附 bbox 證據。解掉問題 1，把問題 3 從「prompt 勸導」改成「schema 不容許糊弄」。</li>
</ul>
<p>順序很關鍵：先 Phase 1 換 artifact，再 Phase 2 加規則 — 否則 Phase 2 的規則寫到一半，artifact 還是舊形狀。</p>`,
  claude: `
<p><strong>我認為這個失敗值得整份重寫，不能用 prompt 微調帶過。</strong>原因是它不是 "reviewer 不小心漏看"，而是 schema 給了 reviewer 一條合法的偷懶路徑（先聚合 unit 再宣布 clean_margin），prompt 怎麼勸都沒用。</p>
<p>但我也想被挑戰：boundary view 改完之後，是不是其實 Phase 2 的 A/B/C 已經不太需要？或者反過來，是不是只要做 Phase 2 就夠了，不用動 artifact？這值得在 BV-1 那張卡討論清楚。</p>`,
  notesPlaceholder: '對失敗診斷有不同看法？要不要再加 case study？'
},
{
  id: 'BV-1',
  phase: 'phase1',
  status: 'decision',
  title: '取消 4 條 edge previews，改成 1 張 boundary preview',
  context: `
<p>現況：每個 <code>crop_unit</code> 產 4 張 edge strip (<code>edges/&lt;id&gt;_{top,bottom,left,right}.png</code>) 和 4 張 preview，每張條的範圍是 <code>[x1, y2-100, x2, y2+100]</code> 之類，紅線疊在 crop 邊上。Reviewer 對稱建 4 張 source edge previews。</p>`,
  plan: `
<p>取消 4 條條。改成每個 crop_unit <strong>一張 boundary preview</strong>（1-to-1）：</p>
<ul>
  <li>從該 crop_unit 所在的 page 裁出比 crop 大一圈的 context view。</li>
  <li>上面用紅色矩形（4 條紅線）標 crop 邊界。</li>
  <li>reviewer 對稱建自己的 source boundary preview。</li>
</ul>
<p>所有 edge_check 共用同一張 preview 作為 evidence，不再有 top/bottom/left/right 各自的 preview path。</p>
<p><strong>boundary_preview 不取代 <code>crop_units[].preview</code></strong>。原本就有的 final crop preview 保留，繼續用來檢查 figure 內部細節（座標軸刻度、tick labels、panel label 等）。分工：</p>
<ul>
  <li><code>crop_units[].preview</code> → 純 figure interior，最高保留解析度，檢查內部細節。</li>
  <li><code>crop_units[].boundary_preview</code> → 含 margin 的 context view，紅矩形標 crop_px，檢查邊界裁切。</li>
</ul>`,
  implementation: `
<ul>
  <li>Artifact 數量大概降 75%（每個 crop_unit 從 4 個 edge file + 4 個 edge preview 變成 1 個 boundary file + 1 個 boundary preview）。</li>
  <li><code>crop_region.py</code> 已支援多 <code>--hline</code> + 多 <code>--vline</code>，不用寫新 script。</li>
  <li>preview 大小走現有 max-dim 1568 規則，不變。</li>
</ul>`,
  claude: `
<p><strong>失敗的本質是 reviewer 被訓練成 "邊條掃描器"</strong>。對 4 條條的標準動作是逐邊問「線外有東西嗎」，這是局部、語境貧乏的判斷。</p>
<p>換成 boundary view 後問題變成「這個紅矩形把任何 unit 切斷嗎」— 整體、有 gestalt 的判斷。人的注意力會被「形狀斷裂處」自動吸引（這就是你一眼看到垃圾桶被切的原因）。</p>
<p>把 procedural 判斷改回 perceptual 判斷，正好是 worker / reviewer perception-correlated 失敗的解藥之一。</p>
<p><strong>要被挑戰的點</strong>：local resolution 降了 ~2×（窄條 px-per-cm 比 context view 高）。&lt; 5 px source 級的微切會更難看見。但本次失敗是 30 + px，而 &lt; 5 px 級的 cut 多半是 anti-aliasing 殘留，不值得用 4× artifact 數量保證能看到。</p>`,
  notesPlaceholder: '同意取消 4 條 edge 嗎？有其他 hybrid 方案？'
},
{
  id: 'BV-2',
  phase: 'phase1',
  status: 'todo',
  title: 'Boundary view 規格（margin、紅框、preview）',
  context: `
<p>margin 大小、紅線寬度、preview resize 規則要寫死，否則 worker 和 reviewer 會各自生不同形狀的圖，比較時對不上。</p>`,
  plan: `
<p><strong>Margin formula</strong>（每邊獨立，clamp 到 page bounds）：</p>
<pre>margin_per_side = max(
    round(0.15 * crop_dim_along_axis),
    250 px
)

context_box = [
    max(0,        crop_px[0] - margin_left),
    max(0,        crop_px[1] - margin_top),
    min(page_w,   crop_px[2] + margin_right),
    min(page_h,   crop_px[3] + margin_bottom),
]</pre>
<p><strong>紅框</strong>：crop_px 投影到 context_box 局部座標，畫 4 條紅線（2 hline + 2 vline），4 px 寬。</p>
<p><strong>Preview</strong>：context_box 原圖丟給 <code>make_image_preview.py --max-dim 1568</code>。</p>`,
  implementation: `
<p>不寫新 script，直接用 <code>crop_region.py</code>：</p>
<pre>python3 crop_region.py page_N.png x0 y0 x1 y1 boundaries/&lt;id&gt;.png \\
  --hline crop_y1 --hline crop_y2 \\
  --vline crop_x1 --vline crop_x2</pre>
<p>由 SKILL 規定 margin 計算公式，agent / parent 自己算座標，不藏進 helper。</p>`,
  claude: `
<p><strong>Margin 用 <code>max(percentage, absolute)</code> 是必要的</strong>。純百分比對小圖 margin 會太薄；純絕對值對全頁圖會超頁。15% 是經驗值，可以調整。</p>
<p><strong>Full-bleed 情況</strong>：crop 貼頁邊時，context_box 在那一側 clamp 到 0 或 page_w，紅線就壓在 preview 邊緣。Reviewer 看到「紅線沒有外側 margin」就應該用 <code>intentional_full_bleed_edge</code> 判定，不算 fail。這個語意要在 figure_reviewer.md 寫清楚。</p>
<p><strong>解析度降級</strong>：加 margin 後 downscale 到 max-dim 1568，figure interior 比 standalone crop preview 小 12-23%（依 figure 在 page 中的比例）。tick label / 座標軸會變模糊。這就是為什麼 BV-1 保留 <code>crop_units[].preview</code>（純 figure，高保留解析度）和 <code>boundary_preview</code>（含 margin 的 context view）並存的原因 — 兩個 preview 分工不同：細節檢查讀 preview，邊界檢查讀 boundary_preview。</p>`,
  notesPlaceholder: 'margin 公式有意見？要不要改 percentage 或 absolute 預設值？'
},
{
  id: 'BV-3',
  phase: 'phase1',
  status: 'decision',
  title: 'per-crop_unit 一張 boundary preview（1-to-1）',
  context: `
<p>一個 figure 可能有多個 <code>crop_units</code>，同頁或跨頁都會發生。原本我提過 per-page 共用一張的版本，但使用者指出 per-crop_unit 比較好；我同意。這張卡定義 1-to-1 的 schema。</p>`,
  plan: `
<p>每個 <code>crop_unit</code> 自己一張 boundary preview，純塌縮原本的 <code>edge_previews</code>：</p>
<pre>// 舊
"crop_units": [{
  "crop_id": "Figure_2_part_1",
  "page": 4,
  "crop_px": [...],
  "image_file": "crops/Figure_2_part_1.png",
  "preview": "previews/Figure_2_part_1_preview.png",
  "edge_previews": {
    "top":    "previews/Figure_2_part_1_top_preview.png",
    "bottom": "previews/Figure_2_part_1_bottom_preview.png",
    "left":   "previews/Figure_2_part_1_left_preview.png",
    "right":  "previews/Figure_2_part_1_right_preview.png"
  },
  "role": "..."
}]

// 新
"crop_units": [{
  "crop_id": "Figure_2_part_1",
  "page": 4,
  "crop_px": [...],

function defaultState() {
  const s = { statuses: {}, notes: {}, expanded: {}, contextOpen: {} };
  cards.forEach(card => {
    s.statuses[card.id] = card.status;
    s.notes[card.id] = '';
    s.expanded[card.id] = card.phase === 'phase1';
    s.contextOpen[card.id] = false;
  });
  return s;
}

function loadState() {
  const def = defaultState();
  try {
    const emb = (typeof EMBEDDED_USER_DATA !== 'undefined') ? EMBEDDED_USER_DATA : { statuses: {}, notes: {} };
    cards.forEach(card => {
      if (card.id in emb.statuses) def.statuses[card.id] = emb.statuses[card.id];
      if (card.id in emb.notes && emb.notes[card.id]) def.notes[card.id] = emb.notes[card.id];
    });
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return def;
    const s = JSON.parse(raw);
    cards.forEach(card => {
      if (!(card.id in s.statuses)) s.statuses[card.id] = def.statuses[card.id];
      if (!(card.id in s.notes)) s.notes[card.id] = def.notes[card.id] || '';
      if (!(card.id in s.expanded)) s.expanded[card.id] = def.expanded[card.id];
      if (!(card.id in s.contextOpen)) s.contextOpen[card.id] = false;
    });
    return s;
  } catch {
    return def;
  }
}

let state = loadState();
let activeFilter = 'all';
let searchQuery = '';

function phaseLabel(phase) {
  return phase === 'phase1' ? 'Phase 1' : 'Phase 2';
}

function render() {
  const c = document.getElementById('container');
  c.innerHTML = '';

  const overview = document.createElement('div');
  overview.className = 'overview';
  overview.innerHTML = `
    <div class="overview-head">Two-Phase Boundary</div>
    <div class="phase-grid">
      <div class="phase-col phase1">
        <h2>Phase 1: boundary view (artifact reshape)</h2>
        <ul>
          <li>取消每個 crop_unit 的 4 條 edge previews</li>
          <li>改成每頁一張 boundary preview（page context + 紅矩形）</li>
          <li>per-edge verdict 保留，evidence 收斂到一張圖</li>
          <li>每個 crop_unit 一張 boundary preview（1-to-1）</li>
          <li>加 mechanical crop ↔ source[crop_px] hash check</li>
        </ul>
      </div>
      <div class="phase-col phase2">
        <h2>Phase 2: schema rules (tightening)</h2>
        <ul>
          <li>SR-A：expected_visual_units 必須 per-labeled-element</li>
          <li>SR-B：bounded_by_unit 必須是該軸 bbox 極值（不要 source bbox）</li>
          <li>SR-C：observed_visual_units.present 必填 bbox_in_crop_px</li>
          <li>SR-D：extractor 只做 enumeration，不做 per-unit verification</li>
          <li>SR-F：figure_repair.md 對齊新 schema</li>
          <li>SR-E：完整 luciferase 回歸 + repair loop</li>
        </ul>
      </div>
    </div>`;
  c.appendChild(overview);

  cards.forEach(card => {
    const st = state.statuses[card.id];
    const isOpen = !!state.expanded[card.id];
    const contextOpen = !!state.contextOpen[card.id];

    const el = document.createElement('div');
    el.className = 'card' + (isOpen ? ' open' : '');
    el.dataset.id = card.id;
    el.dataset.phase = card.phase;
    el.dataset.status = st;
    el.innerHTML = `
      <div class="card-header">
        <span class="card-num ${card.phase}">${card.id}</span>
        <span class="card-title">${card.title}</span>
        <span class="badge" data-status="${st}" data-id="${card.id}">${STATUS_LABELS[st]}</span>
        <span class="card-arrow">&#9654;</span>
      </div>
      <div class="card-body">
        <div class="section-toggle ${contextOpen ? 'open' : ''}" data-id="${card.id}">
          <span class="arrow">&#9654;</span> Context
        </div>
        <div class="section-content ${contextOpen ? 'open' : ''}" data-id="${card.id}">
          ${card.context}
        </div>
        <div class="plan-grid">
          <div class="panel ${card.phase}">
            <div class="panel-head ${card.phase}"><span class="dot"></span>${phaseLabel(card.phase)} Plan</div>
            ${card.plan}
          </div>
          <div class="panel ${card.phase === 'phase1' ? 'phase2' : 'phase1'}">
            <div class="panel-head ${card.phase === 'phase1' ? 'phase2' : 'phase1'}"><span class="dot"></span>Implementation</div>
            ${card.implementation}
          </div>
          <div class="panel claude">
            <div class="panel-head claude"><span class="dot"></span>Claude</div>
            ${card.claude || '<p><em>No response yet.</em></p>'}
          </div>
          <div class="panel notes">
            <div class="panel-head notes"><span class="dot"></span>Notes</div>
            <textarea class="note" data-id="${card.id}" placeholder="${card.notesPlaceholder}">${state.notes[card.id] || ''}</textarea>
          </div>
        </div>
      </div>`;
    c.appendChild(el);
  });

  updateProgress();
  applyFilter();
}

function updateProgress() {
  const total = cards.length;
  const p1 = cards.filter(c => c.phase === 'phase1').length;
  const p2 = cards.filter(c => c.phase === 'phase2').length;
  const done = cards.filter(c => state.statuses[c.id] === 'done').length;
  document.getElementById('progress').textContent = `${total} cards | ${p1} phase 1 | ${p2} phase 2 | ${done} done`;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const t = document.getElementById('saveToast');
  t.textContent = 'Saved';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1200);
}

function applyFilter() {
  document.querySelectorAll('.card[data-id]').forEach(card => {
    const id = card.dataset.id;
    const phase = card.dataset.phase;
    const st = state.statuses[id];
    const matchFilter =
      activeFilter === 'all' ||
      activeFilter === phase ||
      activeFilter === st;
    const matchSearch =
      !searchQuery ||
      card.textContent.toLowerCase().includes(searchQuery.toLowerCase());
    card.classList.toggle('hidden', !(matchFilter && matchSearch));
  });
}

function statusMenuFor(id) {
  return `
    <div class="status-menu open" data-menu-for="${id}">
      ${Object.entries(STATUS_LABELS).map(([key, label]) => `
        <div class="status-option" data-set-status="${key}" data-id="${id}">
          <span class="status-dot" style="background:${STATUS_META[key].color}"></span>
          ${label}
        </div>`).join('')}
    </div>`;
}

document.addEventListener('click', e => {
  const openMenu = document.querySelector('.status-menu.open');

  const badge = e.target.closest('.badge');
  if (badge) {
    e.stopPropagation();
    if (openMenu) openMenu.remove();
    badge.insertAdjacentHTML('beforeend', statusMenuFor(badge.dataset.id));
    return;
  }

  const option = e.target.closest('.status-option');
  if (option) {
    e.stopPropagation();
    state.statuses[option.dataset.id] = option.dataset.setStatus;
    saveState();
    render();
    return;
  }

  if (openMenu) openMenu.remove();

  const header = e.target.closest('.card-header');
  if (header) {
    const card = header.closest('.card');
    const id = card.dataset.id;
    state.expanded[id] = !state.expanded[id];
    card.classList.toggle('open');
    saveState();
    return;
  }

  const toggle = e.target.closest('.section-toggle');
  if (toggle) {
    const id = toggle.dataset.id;
    state.contextOpen[id] = !state.contextOpen[id];
    saveState();
    render();
    return;
  }
});

document.addEventListener('input', e => {
  if (e.target.classList.contains('note')) {
    state.notes[e.target.dataset.id] = e.target.value;
    saveState();
  }
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilter();
});

document.getElementById('expandAll').addEventListener('click', () => {
  cards.forEach(card => state.expanded[card.id] = true);
  saveState();
  render();
});

document.getElementById('collapseAll').addEventListener('click', () => {
  cards.forEach(card => state.expanded[card.id] = false);
  saveState();
  render();
});

document.getElementById('saveFile').addEventListener('click', () => {
  const exportData = { statuses: {}, notes: {} };
  cards.forEach(card => {
    const st = state.statuses[card.id];
    if (st !== card.status) exportData.statuses[card.id] = st;
    const note = (state.notes[card.id] || '').trim();
    if (note) exportData.notes[card.id] = note;
  });
  const html = document.documentElement.outerHTML;
  const newBlock = `const EMBEDDED_USER_DATA = ${JSON.stringify(exportData, null, 2)};`;
  const updated = html.replace(/const EMBEDDED_USER_DATA = \{[\s\S]*?\};/, newBlock);
  const blob = new Blob(['<!DOCTYPE html>\n' + updated], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'boundary_view_plan.html';
  a.click();
  URL.revokeObjectURL(a.href);
  const t = document.getElementById('saveToast');
  t.textContent = 'File downloaded - overwrite original to persist';
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.textContent = 'Saved'; }, 3000);
});

render();
</script>
