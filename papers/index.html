      <a href="chromatin-structure-regulatory-activity/chromatin-structure-regulatory-activity.html">
        <h2>染色質位置只放大縮小、不挑 DNA 開關</h2>
        <p class="summary">同一個 DNA 開關（cis-regulatory sequence, CRS）放在基因組不同位置會表現出非常不同的活性。作者想知道：周圍環境（chromatin）對開關的影響，到底是「跟每個開關的序列特性糾纏在一起」，還是「不管什麼開關，都被同一個倍數整齊放大或縮小」。他們發明了一套同時測量幾百種開關插入多個指定位置的方法，發現後者成立——位置只是個倍數放大器。</p>
      </a>
