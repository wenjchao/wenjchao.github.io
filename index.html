<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wenjchao.github.io</title>
  <style>
    :root {
      --ink: #202124;
      --muted: #626a73;
      --rule: #d9dde3;
      --paper: #ffffff;
      --soft: #f5f7f9;
      --accent: #0f8f8a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.55;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 22px 88px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 36px;
    }

    .avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      object-fit: cover;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.7rem;
      line-height: 1.2;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .links {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .links a {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 22px 4px;
      color: inherit;
      text-decoration: none;
      border-top: 1px solid var(--rule);
    }

    .links li:first-child a {
      border-top: 0;
    }

    .links a:hover {
      background: var(--soft);
    }

    h2 {
      margin: 0 0 5px;
      font-size: 1.05rem;
      line-height: 1.35;
    }

    .links p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .arrow {
      color: var(--accent);
      font-size: 1.25rem;
    }

    @media (max-width: 560px) {
      main {
        padding-top: 34px;
      }

      header {
        align-items: flex-start;
      }

      .links a {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img class="avatar" src="papers/assets/avatar.jpg" alt="wenjchao">
      <div>
        <h1>wenjchao.github.io</h1>
        <p>Projects and notes.</p>
      </div>
    </header>

    <ul class="links">
      <li>
        <a href="Fluid_dynamic/">
          <span>
            <h2>Fluid Dynamic</h2>
            <p>Navier-Stokes sphere-flow animation with u, p, μ controls and calculated Rn.</p>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </li>
      <li>
        <a href="WebAI/">
          <span>
            <h2>WebAI</h2>
            <p>Local browser LLM demo.</p>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </li>
      <li>
        <a href="papers/">
          <span>
            <h2>Papers</h2>
            <p>Reading notes and paper summaries.</p>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
